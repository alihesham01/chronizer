services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: chronizer-postgres
    environment:
      POSTGRES_DB: chronizer
      POSTGRES_USER: chronizer_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_2024}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chronizer_user -d chronizer"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Tuned for 1M+ transactions across 40 brands
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=512MB
        -c work_mem=16MB
        -c maintenance_work_mem=128MB
        -c max_connections=150

  # Redis — shared cache, rate limiting, job queue
  redis:
    image: redis:7-alpine
    container_name: chronizer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    mem_limit: 300m

  # Backend API (no scrapers — they run in the worker)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chronizer-backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://chronizer_user:${DB_PASSWORD:-secure_password_2024}@postgres:5432/chronizer
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: http://localhost:3001
      DB_POOL_SIZE: 50
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@chronizer.com}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    mem_limit: 512m

  # Scraper Worker (separate process — cron + BullMQ job processing)
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: chronizer-worker
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://chronizer_user:${DB_PASSWORD:-secure_password_2024}@postgres:5432/chronizer
      REDIS_URL: redis://redis:6379
      PORTAL_ENCRYPTION_KEY: ${PORTAL_ENCRYPTION_KEY}
      SCRAPER_CONCURRENCY: 5
      DB_POOL_SIZE: 20
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@chronizer.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 1024m

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chronizer-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
    ports:
      - "3001:3000"
    depends_on:
      - backend
    restart: unless-stopped
    mem_limit: 512m

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: chronizer-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: chronizer-network
